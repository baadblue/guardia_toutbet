name: CI Tests (Playwright + Locust)
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
permissions:
  contents: read
jobs:
  tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: toutbet
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d toutbet"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: ${{ vars.CI_DATABASE_URL || 'postgresql://postgres:postgres@localhost:5432/toutbet?schema=public' }}
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET || 'ci-jwt-secret-change-me' }}
      CORS_ALLOWED_ORIGINS: ${{ vars.CI_CORS_ALLOWED_ORIGINS || 'http://localhost:3000' }}
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.CI_NEXT_PUBLIC_API_BASE_URL || 'http://localhost:4000' }}
      PW_UI_BASE_URL: ${{ vars.CI_PW_UI_BASE_URL || 'http://localhost:3000' }}
      PW_API_BASE_URL: ${{ vars.CI_PW_API_BASE_URL || 'http://localhost:4000' }}
      LOCUST_INITIAL_BALANCE: ${{ vars.CI_LOCUST_INITIAL_BALANCE || '100' }}
      LOCUST_WAGER_AMOUNT: ${{ vars.CI_LOCUST_WAGER_AMOUNT || '10' }}
      LOCUST_BETTORS_COUNT: ${{ vars.CI_LOCUST_BETTORS_COUNT || '20' }}
      LOCUST_SAME_USER_CONCURRENCY: ${{ vars.CI_LOCUST_SAME_USER_CONCURRENCY || '12' }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: npm ci
    - name: Install frontend dependencies
      run: npm ci --prefix frontend
    - name: Install Locust
      run: python -m pip install --upgrade pip locust==2.24.0
    - name: Prepare database
      run: |
        npx prisma generate
        npx prisma migrate deploy
    - name: Start backend server
      run: |
        npm run start:backend &
        npx wait-on tcp:4000
    - name: Start frontend server
      run: |
        npm run dev --prefix frontend &
        npx wait-on tcp:3000
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright and Locust in parallel
      run: |
        set -o pipefail

        npx playwright test > playwright-output.log 2>&1 &
        PW_PID=$!

        locust -f tests/locust/locustfile.py \
          --host http://localhost:4000 \
          --headless \
          -u 8 \
          -r 8 \
          --run-time 20s \
          --only-summary \
          --exit-code-on-error 0 > locust-output.log 2>&1 &
        LOCUST_PID=$!

        wait "$PW_PID"
        PW_EXIT=$?

        wait "$LOCUST_PID"
        LOCUST_EXIT=$?

        if grep -q "Overspend risk detected" locust-output.log; then
          echo "Locust detected overspend risk under concurrent load."
          LOCUST_RISK_EXIT=1
        else
          echo "No overspend risk detected by Locust gate."
          LOCUST_RISK_EXIT=0
        fi

        if [ "$PW_EXIT" -ne 0 ] || [ "$LOCUST_EXIT" -ne 0 ] || [ "$LOCUST_RISK_EXIT" -ne 0 ]; then
          echo "Playwright exit=$PW_EXIT, Locust exit=$LOCUST_EXIT, Locust risk=$LOCUST_RISK_EXIT"
          exit 1
        fi
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: locust-report
        path: locust-output.log
        retention-days: 30
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: ci-test-logs
        path: playwright-output.log
        retention-days: 30
