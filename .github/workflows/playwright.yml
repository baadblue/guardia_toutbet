name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: toutbet
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d toutbet"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/toutbet?schema=public
      JWT_SECRET: ci-jwt-secret-change-me
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      PW_UI_BASE_URL: http://localhost:3000
      PW_API_BASE_URL: http://localhost:4000
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install frontend dependencies
      run: npm ci --prefix frontend
    - name: Prepare database
      run: |
        npx prisma generate
        npx prisma migrate deploy
    - name: Start backend server
      run: |
        npm run start:backend &
        npx wait-on tcp:4000
    - name: Start frontend server
      run: |
        npm run dev --prefix frontend &
        npx wait-on tcp:3000
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
