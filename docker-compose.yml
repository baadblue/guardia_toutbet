services:
  postgres:
    image: postgres:16
    container_name: toutbet-postgres
    environment:
      POSTGRES_USER: toutbet
      POSTGRES_PASSWORD: toutbet
      POSTGRES_DB: toutbet
    ports:
      - "5432:5432"
    volumes:
      - toutbet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toutbet -d toutbet"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  toutbet_pgdata:
